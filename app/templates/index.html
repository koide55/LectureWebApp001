{% extends "base.html" %}
{% block content %}
<h2>Top</h2>
<p>Flask based lecture scaffold for authentication and security exercises.</p>
{% if current_user %}
<p><a href="{{ url_for('main.me') }}">Go to your page</a></p>
<form action="{{ url_for('main.logout') }}" method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
  <button type="submit">Logout</button>
</form>
{% else %}
<p><a href="{{ url_for('main.login') }}">Login</a></p>
{% endif %}
{% endblock %}
